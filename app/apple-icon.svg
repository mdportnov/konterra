<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="globe" cx="38%" cy="32%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="globeClip">
      <circle cx="90" cy="90" r="62"/>
    </clipPath>
    <filter id="pinShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0b1f4d" flood-opacity="0.5"/>
    </filter>
    <filter id="connShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0b1f4d" flood-opacity="0.55"/>
    </filter>
    <filter id="dotShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2" flood-color="#0b1f4d" flood-opacity="0.7"/>
    </filter>
  </defs>

  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <circle cx="90" cy="90" r="62" fill="url(#globe)"/>
  <g clip-path="url(#globeClip)" stroke="#ffffff" stroke-opacity="0.38" stroke-width="1.8" fill="none" stroke-linecap="round">
    <ellipse cx="90" cy="90" rx="62" ry="22"/>
    <ellipse cx="90" cy="90" rx="62" ry="44"/>
    <ellipse cx="90" cy="90" rx="22" ry="62"/>
    <ellipse cx="90" cy="90" rx="44" ry="62"/>
    <line x1="28" y1="90" x2="152" y2="90"/>
  </g>
  <circle cx="90" cy="90" r="62" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="2.5"/>

  <g stroke="#ffffff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-opacity="0.95" filter="url(#connShadow)">
    <path d="M90 64 Q50 64 40 90"/>
    <path d="M90 64 Q56 100 52 138"/>
    <path d="M90 64 Q108 110 100 146"/>
    <path d="M90 64 Q140 96 142 124"/>
    <path d="M90 64 Q138 64 148 86"/>
  </g>
  <g filter="url(#dotShadow)">
    <g fill="#ffffff">
      <circle cx="40" cy="90" r="5.5"/>
      <circle cx="52" cy="138" r="5.5"/>
      <circle cx="100" cy="146" r="5.5"/>
      <circle cx="142" cy="124" r="5.5"/>
      <circle cx="148" cy="86" r="5.5"/>
    </g>
    <g fill="#1d4ed8">
      <circle cx="40" cy="90" r="2.1"/>
      <circle cx="52" cy="138" r="2.1"/>
      <circle cx="100" cy="146" r="2.1"/>
      <circle cx="142" cy="124" r="2.1"/>
      <circle cx="148" cy="86" r="2.1"/>
    </g>
  </g>

  <g filter="url(#pinShadow)">
    <path d="M90 24c-14.4 0-26 11.4-26 25.4 0 19.05 26 46.5 26 46.5s26-27.45 26-46.5C116 35.4 104.4 24 90 24z" fill="#ffffff"/>
    <circle cx="90" cy="48.5" r="9.5" fill="#1d4ed8"/>
  </g>
</svg>
